services:
  - type: web
    name: notification-pusher
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Neon DB connection string (enter when prompted on Render)
      - key: REDIS_URL
        sync: false # Render Redis connection string (enter when prompted on Render)
      - key: JWT_SECRET
        generateValue: true # Render will auto-generate a secure random secret
      - key: VALID_API_KEYS
        value: dev-key-123
