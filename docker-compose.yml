services:
  db:
    image: postgres:15-alpine
    container_name: notification-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: "unless-stopped"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    restart: "unless-stopped"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  backend:
    build: .
    container_name: notification-backend
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://devuser:dev_password@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_secret_key
      - FASTAPI_ENV=development
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: "unless-stopped"
    deploy:
      resources:
        limits:
          memory: 512M
    command: bash entrypoint.sh

volumes:
  postgres_data:
